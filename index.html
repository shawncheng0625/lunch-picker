<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>午餐抽籤機</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg:#FFF8F0; --surface:#FFFFFF; --surface2:#FFF1E0;
    --accent:#E8500A; --accent2:#FF7B35;
    --text:#2A1A0A; --muted:#8A6A50;
    --border:#F0D8C0; --tag-bg:#FFE8D0; --tag-text:#C04010;
    --blue:#1565C0; --blue-light:#EFF5FB; --blue-border:#90B8DC;
    --green:#2E7D32; --green-light:#F1F8F1; --green-border:#A5C898;
    --radius:14px; --shadow:0 4px 24px rgba(180,80,20,0.10);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; min-height:100vh; }

  /* HEADER */
  header { background:var(--accent); padding:2rem 2rem 1.5rem; text-align:center; position:relative; overflow:hidden; }
  header::before { content:''; position:absolute; top:-40px; right:-40px; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,0.07); }
  header::after  { content:''; position:absolute; bottom:-60px; left:-20px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,0.05); }
  header h1 { font-family:'Noto Serif TC',serif; font-size:2.2rem; font-weight:700; color:#FFF; letter-spacing:0.06em; position:relative; z-index:1; }
  header p  { color:rgba(255,255,255,0.75); font-size:0.95rem; margin-top:0.4rem; position:relative; z-index:1; }
  .container { max-width:680px; margin:0 auto; padding:2rem 1.25rem 4rem; }

  /* SPIN */
  .spin-section { background:var(--surface); border-radius:var(--radius); border:1.5px solid var(--border); padding:2rem; text-align:center; margin-bottom:1.5rem; box-shadow:var(--shadow); }
  .result-bowl { width:180px; height:180px; border-radius:50%; background:var(--surface2); border:3px solid var(--border); margin:0 auto 1rem; display:flex; align-items:center; justify-content:center; flex-direction:column; transition:all 0.3s; overflow:hidden; }
  .result-bowl.spinning { animation:spinBowl 0.12s linear infinite; border-color:var(--accent); background:var(--tag-bg); }
  .result-bowl.result-show { background:var(--accent); border-color:var(--accent2); animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  @keyframes spinBowl { 0%{transform:rotate(0deg) scale(1)} 50%{transform:rotate(180deg) scale(1.04)} 100%{transform:rotate(360deg) scale(1)} }
  @keyframes popIn { 0%{transform:scale(0.7);opacity:0.5} 100%{transform:scale(1);opacity:1} }
  .bowl-icon { font-size:3rem; display:block; line-height:1; }
  .bowl-text { font-size:0.85rem; color:var(--muted); margin-top:0.3rem; font-weight:500; }
  .bowl-result-name { font-family:'Noto Serif TC',serif; font-size:1.2rem; font-weight:700; color:#FFF; padding:0 1rem; line-height:1.3; }
  .bowl-result-tag { font-size:0.78rem; color:rgba(255,255,255,0.85); margin-top:0.2rem; }

  /* MODE BAR */
  .mode-bar { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.75rem; flex-wrap:wrap; }
  .mode-label { font-size:0.82rem; color:var(--muted); font-weight:500; white-space:nowrap; }
  .mode-select { background:var(--surface); border:1.5px solid var(--accent2); border-radius:50px; padding:0.3rem 0.9rem; font-size:0.85rem; font-family:'Noto Sans TC',sans-serif; color:var(--accent); font-weight:700; outline:none; cursor:pointer; }
  .mode-select:focus { border-color:var(--accent); }
  .region-select { background:var(--surface); border:1.5px solid var(--blue-border); border-radius:50px; padding:0.3rem 0.9rem; font-size:0.85rem; font-family:'Noto Sans TC',sans-serif; color:var(--blue); font-weight:500; outline:none; cursor:pointer; display:none; }

  .spin-btn { background:var(--accent); color:#FFF; border:none; border-radius:50px; padding:0.85rem 2.5rem; font-size:1.1rem; font-family:'Noto Sans TC',sans-serif; font-weight:700; cursor:pointer; letter-spacing:0.06em; transition:background 0.2s,transform 0.1s; box-shadow:0 4px 16px rgba(232,80,10,0.25); margin-top:0.5rem; }
  .spin-btn:hover { background:#C83A00; }
  .spin-btn:active { transform:scale(0.97); }
  .spin-btn:disabled { background:#ccc; cursor:not-allowed; box-shadow:none; }
  .empty-hint { color:var(--muted); font-size:0.85rem; margin-top:0.5rem; }

  /* FILTER */
  .filter-bar { display:flex; flex-wrap:wrap; gap:0.5rem; margin-bottom:1.25rem; align-items:center; }
  .filter-label { font-size:0.85rem; color:var(--muted); font-weight:500; }
  .tag-filter-btn { background:var(--surface); border:1.5px solid var(--border); color:var(--muted); border-radius:50px; padding:0.3rem 0.85rem; font-size:0.82rem; font-family:'Noto Sans TC',sans-serif; cursor:pointer; transition:all 0.15s; }
  .tag-filter-btn.active { background:var(--tag-bg); border-color:var(--accent2); color:var(--tag-text); font-weight:500; }

  /* CARD */
  .card { background:var(--surface); border-radius:var(--radius); padding:1.25rem; margin-bottom:1.5rem; }
  .card.dashed-orange { border:1.5px dashed var(--accent2); }
  .card.dashed-blue   { border:1.5px dashed var(--blue-border); }
  .card-title { font-weight:700; font-size:0.95rem; margin-bottom:0.9rem; }
  .card-title.orange { color:var(--accent); }
  .card-title.blue   { color:var(--blue); }

  /* FORM */
  .form-row { display:flex; gap:0.65rem; flex-wrap:wrap; margin-bottom:0.65rem; }
  .form-group { display:flex; flex-direction:column; gap:0.3rem; flex:1; min-width:130px; }
  .form-group label { font-size:0.78rem; color:var(--muted); font-weight:500; }
  input[type="text"], select.form-select {
    background:var(--bg); border:1.5px solid var(--border); border-radius:8px;
    padding:0.5rem 0.75rem; font-size:0.9rem; font-family:'Noto Sans TC',sans-serif;
    color:var(--text); outline:none; transition:border-color 0.15s; width:100%;
  }
  input[type="text"]:focus, select.form-select:focus { border-color:var(--accent); }
  .btn { border:none; border-radius:8px; padding:0.55rem 1.25rem; font-size:0.9rem; font-family:'Noto Sans TC',sans-serif; font-weight:700; cursor:pointer; transition:all 0.15s; white-space:nowrap; align-self:flex-end; }
  .btn-orange { background:var(--accent); color:#FFF; }
  .btn-orange:hover { background:#C83A00; }
  .btn-blue { background:var(--blue); color:#FFF; }
  .btn-blue:hover { background:#0D47A1; }
  .btn-blue:disabled { background:#ccc; cursor:not-allowed; }
  .btn-ghost { background:var(--surface2); color:var(--muted); border:1.5px solid var(--border); }
  .btn-ghost:hover { background:var(--border); }

  /* EMOJI PICKER */
  .emoji-field { position:relative; }
  .emoji-trigger { display:flex; gap:0.4rem; align-items:center; background:var(--bg); border:1.5px solid var(--border); border-radius:8px; padding:0.5rem 0.75rem; cursor:pointer; transition:border-color 0.15s; user-select:none; }
  .emoji-trigger:hover { border-color:var(--accent2); }
  .emoji-trigger .selected-emoji { font-size:1.3rem; line-height:1; }
  .emoji-trigger .trigger-hint { font-size:0.78rem; color:var(--muted); }
  .emoji-picker-popup { display:none; position:absolute; z-index:300; top:calc(100% + 6px); left:0; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:0.75rem; box-shadow:0 8px 32px rgba(0,0,0,0.15); width:280px; max-height:260px; overflow-y:auto; }
  .emoji-picker-popup.open { display:block; }
  .emoji-category-label { font-size:0.7rem; color:var(--muted); font-weight:700; margin:0.5rem 0 0.25rem; letter-spacing:0.05em; }
  .emoji-grid { display:flex; flex-wrap:wrap; gap:2px; margin-bottom:0.25rem; }
  .emoji-opt { font-size:1.3rem; width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:6px; cursor:pointer; transition:background 0.1s; border:none; background:transparent; }
  .emoji-opt:hover { background:var(--surface2); }
  .emoji-opt.selected { background:var(--tag-bg); outline:2px solid var(--accent2); }

  /* RESTAURANT LIST */
  .section-title { font-family:'Noto Serif TC',serif; font-size:1.1rem; font-weight:700; color:var(--text); margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem; }
  .count-badge { background:var(--tag-bg); color:var(--tag-text); font-size:0.75rem; font-family:'Noto Sans TC',sans-serif; border-radius:50px; padding:0.15rem 0.6rem; font-weight:500; }
  .restaurant-list { display:flex; flex-direction:column; gap:0.65rem; margin-bottom:1.5rem; max-height:400px; overflow-y:auto; padding-right:4px; }
  .restaurant-item { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:0.9rem 1rem; display:flex; align-items:center; gap:0.75rem; transition:border-color 0.2s,box-shadow 0.2s; animation:slideIn 0.25s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .restaurant-item:hover { border-color:var(--accent2); box-shadow:0 2px 12px rgba(232,80,10,0.08); }
  .restaurant-item.highlight { border-color:var(--accent); background:#FFF3ED; box-shadow:0 0 0 3px rgba(232,80,10,0.12); }
  .rest-emoji { font-size:1.5rem; width:2.2rem; text-align:center; flex-shrink:0; }
  .rest-info { flex:1; min-width:0; }
  .rest-name { font-weight:700; font-size:0.97rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rest-meta { display:flex; flex-wrap:wrap; gap:0.3rem; margin-top:0.3rem; align-items:center; }
  .tag-pill { background:var(--tag-bg); color:var(--tag-text); font-size:0.72rem; border-radius:50px; padding:0.1rem 0.5rem; font-weight:500; }
  .region-pill { background:var(--blue-light); color:var(--blue); font-size:0.72rem; border-radius:50px; padding:0.1rem 0.5rem; font-weight:500; border:1px solid var(--blue-border); }
  .rest-note { font-size:0.78rem; color:var(--muted); }
  .rest-actions { display:flex; gap:0.4rem; flex-shrink:0; }
  .icon-btn { background:transparent; border:1.5px solid var(--border); border-radius:8px; width:32px; height:32px; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; transition:all 0.15s; color:var(--muted); }
  .icon-btn:hover { background:var(--surface2); border-color:var(--accent2); color:var(--accent); }
  .icon-btn.delete:hover { background:#FFF0F0; border-color:#FF8888; color:#CC2222; }

  /* IO */
  .io-bar { display:flex; gap:0.65rem; margin-bottom:0.75rem; flex-wrap:wrap; }
  .io-btn { display:flex; align-items:center; gap:0.4rem; background:var(--surface); border:1.5px solid var(--border); border-radius:8px; padding:0.55rem 1rem; font-size:0.88rem; font-family:'Noto Sans TC',sans-serif; font-weight:500; color:var(--text); cursor:pointer; transition:all 0.15s; }
  .io-btn.export { border-color:var(--green-border); color:var(--green); }
  .io-btn.export:hover { background:var(--green-light); }
  .io-btn.import { border-color:var(--blue-border); color:var(--blue); }
  .io-btn.import:hover { background:var(--blue-light); }
  .io-hint { font-size:0.78rem; color:var(--muted); margin-bottom:1.5rem; line-height:1.7; background:var(--surface2); border-radius:8px; padding:0.65rem 0.9rem; border-left:3px solid var(--accent2); }

  /* NEARBY */
  .nearby-result-item { background:var(--surface); border:1.5px solid var(--border); border-radius:10px; padding:0.75rem 1rem; display:flex; align-items:center; gap:0.75rem; margin-bottom:0.5rem; }
  .nearby-result-info { flex:1; min-width:0; }
  .nearby-result-name { font-weight:700; font-size:0.92rem; }
  .nearby-result-meta { font-size:0.75rem; color:var(--muted); margin-top:0.2rem; }
  .nearby-add-btn { background:var(--tag-bg); color:var(--tag-text); border:1.5px solid var(--accent2); border-radius:8px; padding:0.3rem 0.75rem; font-size:0.82rem; font-family:'Noto Sans TC',sans-serif; font-weight:700; cursor:pointer; white-space:nowrap; transition:all 0.15s; flex-shrink:0; }
  .nearby-add-btn:hover { background:var(--accent); color:#FFF; border-color:var(--accent); }
  .nearby-add-btn.added { background:#E8F5E9; color:var(--green); border-color:var(--green-border); cursor:default; }
  .nearby-status { text-align:center; color:var(--muted); font-size:0.88rem; padding:1rem 0; }

  /* EMPTY */
  .empty-state { text-align:center; padding:2rem; color:var(--muted); font-size:0.9rem; background:var(--surface); border-radius:var(--radius); border:1.5px dashed var(--border); }
  .empty-state .big-emoji { font-size:3rem; display:block; margin-bottom:0.5rem; }

  /* TOAST */
  #toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(100px); background:var(--text); color:#FFF; padding:0.6rem 1.5rem; border-radius:50px; font-size:0.9rem; font-family:'Noto Sans TC',sans-serif; z-index:999; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); pointer-events:none; white-space:nowrap; }
  #toast.show { transform:translateX(-50%) translateY(0); }

  @media (max-width:480px) {
    header h1 { font-size:1.6rem; }
    .container { padding:1.25rem 0.9rem 3rem; }
    .spin-section { padding:1.25rem 1rem; }
    .form-row { flex-direction:column; }
    .emoji-picker-popup { width:calc(100vw - 2.5rem); }
  }
</style>
</head>
<body>

<header>
  <h1>🍱 午餐抽籤機</h1>
  <p>今天吃什麼，交給命運決定！</p>
  <a href="guide.html" style="position:absolute;top:1rem;right:1rem;z-index:2;background:rgba(255,255,255,0.2);color:#FFF;text-decoration:none;border-radius:50px;padding:0.3rem 0.85rem;font-size:0.8rem;font-family:'Noto Sans TC',sans-serif;border:1px solid rgba(255,255,255,0.4);">❓ 使用說明</a>
</header>

<div class="container">

  <!-- SPIN -->
  <div class="spin-section">
    <div class="result-bowl" id="resultBowl">
      <span class="bowl-icon" id="bowlIcon">🎲</span>
      <span class="bowl-text" id="bowlText">按下抽籤</span>
    </div>

    <!-- MODE BAR -->
    <div class="mode-bar" style="justify-content:center;">
      <span class="mode-label">抽籤模式：</span>
      <select class="mode-select" id="modeSelect" onchange="onModeChange()">
        <option value="region">🗂 區域最愛</option>
        <option value="nearby">📍 搜尋附近</option>
      </select>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="spin()">✨ 開始抽籤！</button>
    <p class="empty-hint" id="emptyHint" style="display:none;"></p>
  </div>

  <!-- FILTER (region mode only) -->
  <div id="filterBarWrap">
    <div class="filter-bar" id="filterBar">
      <span class="filter-label">標籤篩選：</span>
      <button class="tag-filter-btn active" onclick="filterTag(this,'all')">全部</button>
    </div>
    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1.25rem;" id="regionFilterRow">
      <span class="filter-label">抽籤區域：</span>
      <select id="regionSelectBar" class="mode-select" style="color:var(--blue);border-color:var(--blue-border);" onchange="onRegionBarChange()">
        <option value="all">全部區域</option>
      </select>
    </div>
  </div>

  <!-- ADD FORM (region mode only) -->
  <div id="addCardWrap">
    <div class="card dashed-orange">
      <div class="card-title orange" id="formTitle">＋ 新增店家</div>
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group" style="flex:2;">
          <label>店家名稱 *</label>
          <input type="text" id="inputName" placeholder="例：麥當勞、自助餐" maxlength="30">
        </div>
        <div class="form-group" style="flex:1;min-width:110px;">
          <label>圖示</label>
          <div class="emoji-field">
            <div class="emoji-trigger" id="emojiTrigger" onclick="toggleEmojiPicker()">
              <span class="selected-emoji" id="selectedEmoji">🍴</span>
              <span class="trigger-hint">點選更換</span>
            </div>
            <div class="emoji-picker-popup" id="emojiPicker"></div>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>類型標籤</label>
          <input type="text" id="inputTag" placeholder="例：日式、快餐">
        </div>
        <div class="form-group">
          <label>備註</label>
          <input type="text" id="inputNote" placeholder="例：走路5分鐘" maxlength="30">
        </div>
        <div class="form-group" style="min-width:130px;">
          <label>歸屬區域</label>
          <select class="form-select" id="inputRegion">
            <option value="">無區域</option>
          </select>
        </div>
      </div>
      <div class="form-row" style="justify-content:flex-end;margin-bottom:0;">
        <button class="btn btn-ghost" id="cancelBtn" onclick="cancelEdit()" style="display:none;">取消</button>
        <button class="btn btn-orange" id="submitBtn" onclick="submitForm()">新增</button>
      </div>
    </div>

    <!-- REGION MANAGER -->
    <div class="card dashed-orange" style="border-color:var(--border);">
      <div class="card-title orange" style="color:var(--muted);font-size:0.88rem;">🗂 管理區域</div>
      <div class="form-row" style="margin-bottom:0;">
        <div class="form-group">
          <input type="text" id="newRegionName" placeholder="輸入新區域名稱，例：新竹市東區" maxlength="20">
        </div>
        <button class="btn btn-ghost" style="align-self:flex-end;" onclick="addRegion()">新增區域</button>
      </div>
      <div id="regionList" style="margin-top:0.75rem;display:flex;flex-wrap:wrap;gap:0.4rem;"></div>
    </div>
  </div>

  <!-- NEARBY SEARCH -->
  <div id="nearbyCardWrap" style="display:none;">
    <div class="card dashed-blue">
      <div class="card-title blue">📍 搜尋附近餐廳</div>

      <!-- GPS 按鈕 -->
      <button class="btn btn-blue" id="gpsBtn" onclick="searchByGPS()" style="width:100%;margin-bottom:1rem;padding:0.75rem;font-size:1rem;border-radius:10px;">
        📍 使用目前位置
      </button>

      <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.85rem;">
        <div style="flex:1;height:1px;background:var(--border);"></div>
        <span style="font-size:0.78rem;color:var(--muted);">或輸入地點</span>
        <div style="flex:1;height:1px;background:var(--border);"></div>
      </div>

      <!-- 手動輸入 -->
      <div class="form-row">
        <div class="form-group" style="flex:2;">
          <label>地點名稱或地區</label>
          <input type="text" id="nearbyAddress" placeholder="例：新竹市東區、竹蓮市場、清華大學">
        </div>
        <div class="form-group" style="flex:1;min-width:110px;">
          <label>搜尋距離</label>
          <select class="form-select" id="nearbyRadius">
            <option value="300">300 公尺</option>
            <option value="500" selected>500 公尺</option>
            <option value="1000">1 公里</option>
            <option value="1500">1.5 公里</option>
            <option value="2000">2 公里</option>
          </select>
        </div>
      </div>
      <div style="font-size:0.75rem;color:var(--muted);margin-bottom:0.75rem;line-height:1.6;">
        💡 建議輸入<strong>地區名、地標、學校、車站</strong>，避免輸入完整門牌
      </div>
      <div class="form-row" style="justify-content:flex-end;margin-bottom:0.75rem;">
        <button class="btn btn-blue" id="nearbySearchBtn" onclick="searchNearby()">🔍 搜尋</button>
      </div>
      <div id="nearbyResults"></div>
    </div>
  </div>

  <!-- LIST (region mode) -->
  <div id="listWrap">
    <div class="section-title">
      店家清單 <span class="count-badge" id="countBadge">0</span>
    </div>
    <div class="io-bar">
      <button class="io-btn export" onclick="exportExcel()">📥 匯出 Excel</button>
      <button class="io-btn import" onclick="document.getElementById('importFile').click()">📤 匯入 Excel</button>
      <input type="file" id="importFile" accept=".xlsx,.xls" style="display:none" onchange="importExcel(event)">
    </div>
    <div class="io-hint">
      📋 <strong>匯出</strong>：存成 .xlsx，欄位為「名稱、圖示、標籤、備註、區域」。<br>
      📂 <strong>匯入</strong>：同格式匯入，會<strong>取代</strong>現有清單。
    </div>
    <div class="restaurant-list" id="restaurantList"></div>
  </div>

</div>
<div id="toast"></div>

<script>
// ── Emoji ──
const EMOJI_CATEGORIES = [
  { label:'米飯麵食', emojis:['🍱','🍜','🍝','🍛','🍚','🥘','🫕','🍲','🥗','🫔','🌯','🥙'] },

  { label:'飲料甜食', emojis:['🧋','☕','🍵','🥤','🍰','🎂','🍩','🍪','🍦','🧁'] },

function toggleEmojiPicker() { document.getElementById('emojiPicker').classList.toggle('open'); }

      !document.getElementById('emojiPicker').contains(e.target))

});

// ── Data ──
const FOOD_EMOJIS = ['🍜','🍱','🍛','🍝','🥗','🌮','🍔','🍣','🥘','🍲','🥩','🍗','🍖','🫕','🌯','🥙'];
let restaurants = JSON.parse(localStorage.getItem('lunch_restaurants') || '[]');
let regions     = JSON.parse(localStorage.getItem('lunch_regions') || '[]');
let activeTag   = 'all';
let spinning    = false;
let lastChosenId = null;
let currentMode = 'region'; // 'region' | 'nearby'
let nearbyPool  = []; // 當次搜尋結果，供抽籤用

if (restaurants.length === 0) {
  restaurants = [
    { id:1, name:'便利商店', emoji:'🏪', tag:'快餐', note:'最近最方便', region:'' },
    { id:2, name:'自助餐',   emoji:'🍱', tag:'台式', note:'CP值高',     region:'' },

  ];

function save() {
  localStorage.setItem('lunch_restaurants', JSON.stringify(restaurants));
  localStorage.setItem('lunch_regions', JSON.stringify(regions));
}

// ── Region helpers ──
function addRegion() {
  const name = document.getElementById('newRegionName').value.trim();
  if (!name) { showToast('請輸入區域名稱！'); return; }
  if (regions.includes(name)) { showToast('區域已存在！'); return; }
  regions.push(name);
  save();
  document.getElementById('newRegionName').value = '';
  renderRegions();
  showToast(`✅ 已新增區域「${name}」`);
}
function deleteRegion(name) {
  if (!confirm(`刪除區域「${name}」？（店家不會被刪除，只是移除區域標記）`)) return;
  regions = regions.filter(r => r !== name);
  restaurants.forEach(r => { if (r.region === name) r.region = ''; });
  save();
  renderRegions();
  renderRegionSelects();
  renderList();
  showToast(`已刪除區域「${name}」`);
}
function renderRegions() {
  const el = document.getElementById('regionList');
  if (regions.length === 0) {
    el.innerHTML = '<span style="font-size:0.78rem;color:var(--muted);">尚無區域，新增後可在店家歸屬區域選擇</span>';
    return;
  }
  el.innerHTML = regions.map(r => `
    <span style="display:inline-flex;align-items:center;gap:0.3rem;background:var(--blue-light);border:1px solid var(--blue-border);border-radius:50px;padding:0.2rem 0.65rem;font-size:0.8rem;color:var(--blue);">
      ${escHtml(r)}
      <button onclick="deleteRegion('${escHtml(r)}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:0.85rem;padding:0;line-height:1;">✕</button>
    </span>`).join('');
}
function renderRegionSelects() {
  // 新增表單的區域選單
  const inputRegion = document.getElementById('inputRegion');
  const cur = inputRegion.value;
  inputRegion.innerHTML = '<option value="">無區域</option>' +
    regions.map(r => `<option value="${escHtml(r)}" ${cur===r?'selected':''}>${escHtml(r)}</option>`).join('');

  // 篩選列的抽籤區域選單
  const bar = document.getElementById('regionSelectBar');
  if (bar) {
    const curR = bar.value;
    bar.innerHTML = '<option value="all">全部區域</option>' +
      regions.map(r => `<option value="${escHtml(r)}" ${curR===r?'selected':''}>${escHtml(r)}</option>`).join('');
  }
}

function onRegionBarChange() {
  renderList();
}

// ── Mode ──
function onModeChange() {
  currentMode = document.getElementById('modeSelect').value;
  const isRegion = currentMode === 'region';
  document.getElementById('filterBarWrap').style.display  = isRegion ? '' : 'none';
  document.getElementById('addCardWrap').style.display    = isRegion ? '' : 'none';
  document.getElementById('nearbyCardWrap').style.display = isRegion ? 'none' : '';
  document.getElementById('listWrap').style.display       = isRegion ? '' : 'none';
  document.getElementById('regionFilterRow').style.display = isRegion ? '' : 'none';
  nearbyPool = [];
  document.getElementById('nearbyResults').innerHTML = '';
  updateSpinState();
}

function getSpinPool() {
  if (currentMode === 'nearby') return nearbyPool;
  const bar = document.getElementById('regionSelectBar');
  const selRegion = bar ? bar.value : 'all';
  let pool = restaurants;
  if (selRegion !== 'all') pool = pool.filter(r => r.region === selRegion);
  if (activeTag !== 'all') pool = pool.filter(r => r.tag === activeTag);
  return pool;
}

function updateSpinState() {
  const pool = getSpinPool();
  const spinBtn = document.getElementById('spinBtn');
  const hint = document.getElementById('emptyHint');
  if (currentMode === 'nearby' && nearbyPool.length === 0) {
    spinBtn.disabled = true;
    hint.style.display = 'block';
    hint.textContent = '請先搜尋附近餐廳';
  } else if (pool.length === 0) {
    spinBtn.disabled = true;
    hint.style.display = 'block';
    hint.textContent = '此區域沒有店家';
  } else {
    spinBtn.disabled = false;
    hint.style.display = 'none';
  }
}

// ── Render list ──
function renderList() {
  if (currentMode === 'nearby') { updateSpinState(); return; }
  const bar = document.getElementById('regionSelectBar');
  const selRegion = bar ? bar.value : 'all';
  let filtered = restaurants;
  if (selRegion !== 'all') filtered = filtered.filter(r => r.region === selRegion);
  if (activeTag !== 'all') filtered = filtered.filter(r => r.tag === activeTag);

  document.getElementById('countBadge').textContent = filtered.length;
  const list = document.getElementById('restaurantList');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="big-emoji">🍽️</span>這裡還沒有店家</div>`;
  } else {
    list.innerHTML = filtered.map(r => `
      <div class="restaurant-item" id="item-${r.id}">
        <div class="rest-emoji">${r.emoji||'🍴'}</div>
        <div class="rest-info">
          <div class="rest-name">${escHtml(r.name)}</div>
          <div class="rest-meta">
            ${r.region ? `<span class="region-pill">📍${escHtml(r.region)}</span>` : ''}
            ${r.tag    ? `<span class="tag-pill">${escHtml(r.tag)}</span>` : ''}
            ${r.note   ? `<span class="rest-note">${escHtml(r.note)}</span>` : ''}
          </div>
        </div>
        <div class="rest-actions">
          <button class="icon-btn" onclick="startEdit(${r.id})" title="編輯">✏️</button>
          <button class="icon-btn delete" onclick="deleteRestaurant(${r.id})" title="刪除">🗑</button>
        </div>
      </div>`).join('');
  }
  renderFilterBar();
  renderRegionSelects();
  updateSpinState();
}

function renderFilterBar() {
  const tags = [...new Set(restaurants.map(r=>r.tag).filter(Boolean))];
  document.getElementById('filterBar').innerHTML = `
    <span class="filter-label">標籤篩選：</span>
    <button class="tag-filter-btn ${activeTag==='all'?'active':''}" onclick="filterTag(this,'all')">全部</button>
    ${tags.map(t=>`<button class="tag-filter-btn ${activeTag===t?'active':''}" onclick="filterTag(this,'${escHtml(t)}')">${escHtml(t)}</button>`).join('')}`;
}

function filterTag(btn, tag) { activeTag = tag; renderList(); }

// ── Add / Edit ──
function submitForm() {
  const name = document.getElementById('inputName').value.trim();
  if (!name) { showToast('請輸入店家名稱！'); document.getElementById('inputName').focus(); return; }
  const emoji  = selectedEmojiValue || DEFAULT_EMOJI;
  const tag    = document.getElementById('inputTag').value.trim();
  const note   = document.getElementById('inputNote').value.trim();
  const region = document.getElementById('inputRegion').value;
  const editId = document.getElementById('editId').value;

  if (editId) {
    const idx = restaurants.findIndex(r => r.id == editId);
    if (idx !== -1) restaurants[idx] = { id:restaurants[idx].id, name, emoji, tag, note, region };
    showToast(`✅ 已更新「${name}」！`);
  } else {
    restaurants.push({ id:Date.now(), name, emoji, tag, note, region });
    showToast(`✅ 已新增「${name}」！`);
  }
  save(); resetForm(); renderList();
}

function startEdit(id) {
  const r = restaurants.find(r => r.id === id);
  if (!r) return;
  document.getElementById('editId').value    = id;
  document.getElementById('inputName').value = r.name;
  document.getElementById('inputTag').value  = r.tag  || '';
  document.getElementById('inputNote').value = r.note || '';
  renderRegionSelects();
  document.getElementById('inputRegion').value = r.region || '';
  pickEmoji(r.emoji || DEFAULT_EMOJI);
  document.getElementById('formTitle').textContent = '✏️ 編輯店家';
  document.getElementById('submitBtn').textContent = '儲存';
  document.getElementById('cancelBtn').style.display = 'block';
  document.getElementById('addCardWrap').scrollIntoView({ behavior:'smooth', block:'nearest' });
  document.getElementById('inputName').focus();
}

function cancelEdit() { resetForm(); }

function resetForm() {
  document.getElementById('editId').value    = '';
  document.getElementById('inputName').value = '';
  document.getElementById('inputTag').value  = '';
  document.getElementById('inputNote').value = '';
  pickEmoji(DEFAULT_EMOJI);
  document.getElementById('formTitle').textContent = '＋ 新增店家';
  document.getElementById('submitBtn').textContent = '新增';
  document.getElementById('cancelBtn').style.display = 'none';
}

function deleteRestaurant(id) {
  const r = restaurants.find(r => r.id === id);
  restaurants = restaurants.filter(r => r.id !== id);
  if (document.getElementById('editId').value == id) resetForm();
  save(); renderList();
  if (r) showToast(`已刪除「${r.name}」`);
}

// ── Export / Import ──
function exportExcel() {
  if (restaurants.length === 0) { showToast('目前沒有店家可以匯出！'); return; }
  const data = [
    ['名稱','圖示','標籤','備註','區域'],
    ...restaurants.map(r => [r.name, r.emoji||'', r.tag||'', r.note||'', r.region||''])
  ];
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:20},{wch:6},{wch:12},{wch:20},{wch:15}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '午餐店家');
  XLSX.writeFile(wb, '午餐店家清單.xlsx');
  showToast(`📥 已匯出 ${restaurants.length} 家店家！`);
}

function importExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type:'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header:1 });
      const imported = [];
      const importedRegions = new Set(regions);
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const name = (row[0]||'').toString().trim();
        if (!name) continue;
        const region = (row[4]||'').toString().trim();
        if (region) importedRegions.add(region);
        imported.push({
          id: Date.now() + i,
          name,
          emoji: (row[1]||'').toString().trim() || FOOD_EMOJIS[Math.floor(Math.random()*FOOD_EMOJIS.length)],
          tag:   (row[2]||'').toString().trim(),
          note:  (row[3]||'').toString().trim(),
          region,
        });
      }
      if (imported.length === 0) { showToast('⚠️ 沒有讀到有效資料！'); return; }
      if (!confirm(`即將匯入 ${imported.length} 家店家，並取代目前清單，確定嗎？`)) return;
      restaurants = imported;
      regions = [...importedRegions];
      activeTag = 'all';
      save(); renderRegions(); renderList();
      showToast(`📂 已匯入 ${imported.length} 家店家！`);
    } catch(err) { showToast('⚠️ 讀取失敗，請確認是有效的 Excel 檔！'); }
  };
  reader.readAsBinaryString(file);
  event.target.value = '';
}

// ── Nearby Search ──
const CUISINE_EMOJI_MAP = {
  'restaurant':'🍽️','fast_food':'🍔','cafe':'☕','bar':'🍺',
  'bakery':'🥐','meal_takeaway':'🥡','chinese':'🍜','japanese':'🍱',
  'ramen':'🍜','sushi':'🍣','pizza':'🍕','burger':'🍔','bbq':'🥩',
  'vegetarian':'🥗','dessert':'🍰','ice_cream':'🍦',
};
function getEmojiForPlace(tags) {
  if (!tags) return '🍽️';
  const t = tags.toLowerCase();
  for (const [key, emoji] of Object.entries(CUISINE_EMOJI_MAP)) { if (t.includes(key)) return emoji; }
  return '🍽️';
}
async function geocodeAddress(address) {
  const cleaned = address.replace(/^臺灣省?\s*/,'').replace(/^台灣省?\s*/,'').replace(/臺/g,'台');
  const noNumber = cleaned.replace(/\d+號.*$/,'').trim();
  const queries = [cleaned+', Taiwan', noNumber+', Taiwan', cleaned, address+', Taiwan', address]
    .filter((v,i,a) => v.trim() && a.indexOf(v)===i);
  for (const q of queries) {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=tw&accept-language=zh-TW`,
        { headers:{'Accept-Language':'zh-TW,zh;q=0.9'} });
      const data = await res.json();
      if (data && data.length > 0) return { lat:parseFloat(data[0].lat), lon:parseFloat(data[0].lon) };
    } catch(e) { continue; }
  }
  return null;
}
async function fetchNearbyRestaurants(lat, lon, radius) {
  const query = `[out:json][timeout:15];(node["amenity"~"restaurant|fast_food|cafe|bar|food_court"](around:${radius},${lat},${lon});way["amenity"~"restaurant|fast_food|cafe|bar|food_court"](around:${radius},${lat},${lon}););out center tags 30;`;
  const res = await fetch('https://overpass-api.de/api/interpreter', { method:'POST', body:query });
  return (await res.json()).elements || [];
}
function calcDistance(lat1,lon1,lat2,lon2) {
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

let nearbySearchResults = [];
let lastSearchLocation = '';

async function searchByGPS() {
  if (!navigator.geolocation) {
    showToast('⚠️ 此瀏覽器不支援定位功能');
    return;
  }
  const btn = document.getElementById('gpsBtn');
  const resultsDiv = document.getElementById('nearbyResults');
  btn.disabled = true;
  btn.textContent = '📍 定位中…';
  resultsDiv.innerHTML = '<div class="nearby-status">📡 正在取得您的位置…</div>';

  navigator.geolocation.getCurrentPosition(
    async (position) => {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      lastSearchLocation = '目前位置';
      btn.textContent = '📍 搜尋中…';
      resultsDiv.innerHTML = '<div class="nearby-status">🍽️ 搜尋附近餐廳中…</div>';
      try {
        const radius = parseInt(document.getElementById('nearbyRadius').value);
        await doNearbySearch(lat, lon, radius, '目前位置');
      } catch(err) {
        resultsDiv.innerHTML = '<div class="nearby-status">⚠️ 搜尋失敗，請確認網路連線</div>';
        nearbyPool = []; updateSpinState();
      } finally {
        btn.disabled = false;
        btn.textContent = '📍 使用目前位置';
      }
    },
    (error) => {
      btn.disabled = false;
      btn.textContent = '📍 使用目前位置';
      const msgs = {
        1: '⚠️ 已拒絕定位權限，請在瀏覽器設定中允許存取位置',
        2: '⚠️ 無法取得位置，請確認 GPS 已開啟',
        3: '⚠️ 定位逾時，請再試一次',
      };
      resultsDiv.innerHTML = `<div class="nearby-status">${msgs[error.code] || '⚠️ 定位失敗'}</div>`;
      nearbyPool = []; updateSpinState();
    },
    { timeout: 10000, enableHighAccuracy: true }
  );
}

async function searchNearby() {
  const address = document.getElementById('nearbyAddress').value.trim();
  if (!address) { showToast('請輸入地點！'); return; }
  const radius = parseInt(document.getElementById('nearbyRadius').value);
  const resultsDiv = document.getElementById('nearbyResults');
  const btn = document.getElementById('nearbySearchBtn');
  btn.disabled = true; btn.textContent = '搜尋中…';
  resultsDiv.innerHTML = '<div class="nearby-status">🔍 定位中，請稍候…</div>';
  try {
    const coord = await geocodeAddress(address);
    if (!coord) {
      resultsDiv.innerHTML = `<div class="nearby-status">⚠️ 找不到此地點，建議改用地區名稱、地標或學校名稱</div>`;
      nearbyPool = []; updateSpinState(); return;
    }
    await doNearbySearch(coord.lat, coord.lon, radius, address);
  } catch(err) {
    resultsDiv.innerHTML = '<div class="nearby-status">⚠️ 搜尋失敗，請確認網路連線後再試</div>';
    nearbyPool = []; updateSpinState();
  } finally {
    btn.disabled = false; btn.textContent = '🔍 搜尋';
  }
}

async function doNearbySearch(lat, lon, radius, locationName) {
  const resultsDiv = document.getElementById('nearbyResults');
  const places = await fetchNearbyRestaurants(lat, lon, radius);
  if (places.length === 0) {
    resultsDiv.innerHTML = '<div class="nearby-status">😅 附近沒有找到餐廳，試試拉大搜尋距離</div>';
    nearbyPool = []; updateSpinState(); return;
  }
  lastSearchLocation = locationName;
  nearbySearchResults = places
    .filter(p => p.tags && p.tags.name)
    .map(p => {
      const lat2 = p.lat || p.center?.lat, lon2 = p.lon || p.center?.lon;
      const dist = (lat2&&lon2) ? calcDistance(lat,lon,lat2,lon2) : null;
      const cuisine = p.tags.cuisine || p.tags.amenity || '';
      return { osm_id:p.id, name:p.tags.name, emoji:getEmojiForPlace(cuisine+' '+(p.tags.amenity||'')), cuisine, dist };
    })
    .filter(p => p.dist !== null)
    .sort((a,b) => a.dist-b.dist)
    .slice(0, 20);
  nearbyPool = nearbySearchResults.map(p => ({ id:'nearby_'+p.osm_id, name:p.name, emoji:p.emoji, tag:p.cuisine||'', note:p.dist?`距離${p.dist}公尺`:'' }));
  renderNearbyResults();
  updateSpinState();
}

function renderNearbyResults() {
  const resultsDiv = document.getElementById('nearbyResults');
  const existingNames = new Set(restaurants.map(r=>r.name));
  if (nearbySearchResults.length === 0) { resultsDiv.innerHTML = '<div class="nearby-status">沒有找到結果</div>'; return; }
  resultsDiv.innerHTML = `
    <div style="font-size:0.78rem;color:var(--muted);margin-bottom:0.5rem;">
      找到 ${nearbySearchResults.length} 家・可直接抽籤，或點「加入最愛」存入區域清單
    </div>
    ${nearbySearchResults.map((p,i) => {
      const already = existingNames.has(p.name);
      const meta = [p.dist?`${p.dist}公尺`:'', p.cuisine?p.cuisine.replace(/_/g,' '):''].filter(Boolean).join('・');
      return `<div class="nearby-result-item">
        <div style="font-size:1.4rem;width:2rem;text-align:center;flex-shrink:0;">${p.emoji}</div>
        <div class="nearby-result-info">
          <div class="nearby-result-name">${escHtml(p.name)}</div>
          ${meta?`<div class="nearby-result-meta">${escHtml(meta)}</div>`:''}
        </div>
        <button class="nearby-add-btn ${already?'added':''}" id="nearby-btn-${i}"
          onclick="addNearbyToFavorite(${i})" ${already?'disabled':''}>
          ${already?'已加入':'＋ 加入最愛'}
        </button>
      </div>`;
    }).join('')}`;
}

function addNearbyToFavorite(idx) {
  const p = nearbySearchResults[idx];
  if (!p) return;
  // 以搜尋地點名稱自動建立區域
  const regionName = lastSearchLocation;
  if (regionName && !regions.includes(regionName)) { regions.push(regionName); save(); renderRegions(); }
  restaurants.push({ id:Date.now(), name:p.name, emoji:p.emoji, tag:p.cuisine?p.cuisine.split(';')[0].replace(/_/g,'').trim():'附近餐廳', note:p.dist?`距離${p.dist}公尺`:'', region:regionName||'' });
  save();
  const btn = document.getElementById(`nearby-btn-${idx}`);
  if (btn) { btn.textContent='已加入'; btn.classList.add('added'); btn.disabled=true; }
  showToast(`✅ 已加入「${p.name}」到區域「${regionName}」！`);
}

// ── Spin ──
function spin() {
  if (spinning) return;
  const pool = getSpinPool();
  if (pool.length === 0) return;
  spinning = true;
  const bowl = document.getElementById('resultBowl');
  const icon = document.getElementById('bowlIcon');
  const text = document.getElementById('bowlText');
  bowl.className = 'result-bowl spinning';
  document.getElementById('spinBtn').disabled = true;
  const pickPool = pool.length > 1 ? pool.filter(r => r.id !== lastChosenId) : pool;
  const chosen = pickPool[Math.floor(Math.random()*pickPool.length)];
  const interval = setInterval(() => {
    const r = pool[Math.floor(Math.random()*pool.length)];
    icon.textContent = r.emoji||'🍴';
    text.textContent = r.name;
    text.style.color = 'var(--muted)';
  }, 90);
  setTimeout(() => {
    clearInterval(interval);
    bowl.className = 'result-bowl result-show';
    bowl.innerHTML = `<div class="bowl-result-name">${chosen.emoji||'🍴'}<br>${escHtml(chosen.name)}</div><div class="bowl-result-tag">${chosen.tag?escHtml(chosen.tag):'今日推薦'}</div>`;
    if (currentMode === 'region') {
      document.querySelectorAll('.restaurant-item').forEach(el=>el.classList.remove('highlight'));
      const hl = document.getElementById('item-'+chosen.id);
      if (hl) hl.classList.add('highlight');
    }
    lastChosenId = chosen.id;
    spinning = false;
    document.getElementById('spinBtn').disabled = false;
    showToast(`🎉 今天吃「${chosen.name}」！`);
  }, 3000);
}

// ── Utils ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('inputName').addEventListener('keydown', e => { if(e.key==='Enter') submitForm(); });
document.getElementById('newRegionName').addEventListener('keydown', e => { if(e.key==='Enter') addRegion(); });

buildEmojiPicker();
renderRegions();
renderRegionSelects();
onModeChange();
renderList();
</script>
