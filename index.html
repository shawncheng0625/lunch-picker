<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>午餐抽籤機</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg:#FFF8F0; --surface:#FFFFFF; --surface2:#FFF1E0;
    --accent:#E8500A; --accent2:#FF7B35;
    --text:#2A1A0A; --muted:#8A6A50;
    --border:#F0D8C0; --tag-bg:#FFE8D0; --tag-text:#C04010;
    --radius:14px; --shadow:0 4px 24px rgba(180,80,20,0.10);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; min-height:100vh; }
  header { background:var(--accent); padding:2rem 2rem 1.5rem; text-align:center; position:relative; overflow:hidden; }
  header::before { content:''; position:absolute; top:-40px; right:-40px; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,0.07); }
  header::after  { content:''; position:absolute; bottom:-60px; left:-20px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,0.05); }
  header h1 { font-family:'Noto Serif TC',serif; font-size:2.2rem; font-weight:700; color:#FFF; letter-spacing:0.06em; position:relative; z-index:1; }
  header p  { color:rgba(255,255,255,0.75); font-size:0.95rem; margin-top:0.4rem; position:relative; z-index:1; }
  .container { max-width:680px; margin:0 auto; padding:2rem 1.25rem 4rem; }

  /* SPIN */
  .spin-section { background:var(--surface); border-radius:var(--radius); border:1.5px solid var(--border); padding:2rem; text-align:center; margin-bottom:1.5rem; box-shadow:var(--shadow); }
  .result-bowl { width:180px; height:180px; border-radius:50%; background:var(--surface2); border:3px solid var(--border); margin:0 auto 1.5rem; display:flex; align-items:center; justify-content:center; flex-direction:column; transition:all 0.3s; overflow:hidden; }
  .result-bowl.spinning { animation:spinBowl 0.12s linear infinite; border-color:var(--accent); background:var(--tag-bg); }
  .result-bowl.result-show { background:var(--accent); border-color:var(--accent2); animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  @keyframes spinBowl { 0%{transform:rotate(0deg) scale(1)} 50%{transform:rotate(180deg) scale(1.04)} 100%{transform:rotate(360deg) scale(1)} }
  @keyframes popIn { 0%{transform:scale(0.7);opacity:0.5} 100%{transform:scale(1);opacity:1} }
  .bowl-icon { font-size:3rem; display:block; line-height:1; }
  .bowl-text { font-size:0.85rem; color:var(--muted); margin-top:0.3rem; font-weight:500; }
  .bowl-result-name { font-family:'Noto Serif TC',serif; font-size:1.25rem; font-weight:700; color:#FFF; padding:0 1rem; line-height:1.3; }
  .bowl-result-tag { font-size:0.78rem; color:rgba(255,255,255,0.85); margin-top:0.2rem; }
  .spin-btn { background:var(--accent); color:#FFF; border:none; border-radius:50px; padding:0.85rem 2.5rem; font-size:1.1rem; font-family:'Noto Sans TC',sans-serif; font-weight:700; cursor:pointer; letter-spacing:0.06em; transition:background 0.2s,transform 0.1s; box-shadow:0 4px 16px rgba(232,80,10,0.25); }
  .spin-btn:hover { background:#C83A00; }
  .spin-btn:active { transform:scale(0.97); }
  .spin-btn:disabled { background:#ccc; cursor:not-allowed; box-shadow:none; }
  .empty-hint { color:var(--muted); font-size:0.9rem; margin-top:0.75rem; }

  /* FILTER */
  .filter-bar { display:flex; flex-wrap:wrap; gap:0.5rem; margin-bottom:1.25rem; align-items:center; }
  .filter-label { font-size:0.85rem; color:var(--muted); font-weight:500; margin-right:0.25rem; }
  .tag-filter-btn { background:var(--surface); border:1.5px solid var(--border); color:var(--muted); border-radius:50px; padding:0.3rem 0.85rem; font-size:0.82rem; font-family:'Noto Sans TC',sans-serif; cursor:pointer; transition:all 0.15s; }
  .tag-filter-btn.active { background:var(--tag-bg); border-color:var(--accent2); color:var(--tag-text); font-weight:500; }

  /* LIST */
  .section-title { font-family:'Noto Serif TC',serif; font-size:1.1rem; font-weight:700; color:var(--text); margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem; }
  .count-badge { background:var(--tag-bg); color:var(--tag-text); font-size:0.75rem; font-family:'Noto Sans TC',sans-serif; border-radius:50px; padding:0.15rem 0.6rem; font-weight:500; }
  .restaurant-list { display:flex; flex-direction:column; gap:0.65rem; margin-bottom:1.5rem; max-height:400px; overflow-y:auto; padding-right:4px; }
  .restaurant-item { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:0.9rem 1rem; display:flex; align-items:center; gap:0.75rem; transition:border-color 0.2s,box-shadow 0.2s; animation:slideIn 0.25s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .restaurant-item:hover { border-color:var(--accent2); box-shadow:0 2px 12px rgba(232,80,10,0.08); }
  .restaurant-item.highlight { border-color:var(--accent); background:#FFF3ED; box-shadow:0 0 0 3px rgba(232,80,10,0.12); }
  .rest-emoji { font-size:1.5rem; width:2.2rem; text-align:center; flex-shrink:0; }
  .rest-info { flex:1; min-width:0; }
  .rest-name { font-weight:700; font-size:0.97rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rest-meta { display:flex; flex-wrap:wrap; gap:0.3rem; margin-top:0.3rem; align-items:center; }
  .tag-pill { background:var(--tag-bg); color:var(--tag-text); font-size:0.72rem; border-radius:50px; padding:0.1rem 0.5rem; font-weight:500; }
  .rest-note { font-size:0.78rem; color:var(--muted); }
  .rest-actions { display:flex; gap:0.4rem; flex-shrink:0; }
  .icon-btn { background:transparent; border:1.5px solid var(--border); border-radius:8px; width:32px; height:32px; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; transition:all 0.15s; color:var(--muted); }
  .icon-btn:hover { background:var(--surface2); border-color:var(--accent2); color:var(--accent); }
  .icon-btn.delete:hover { background:#FFF0F0; border-color:#FF8888; color:#CC2222; }

  /* ADD / EDIT FORM */
  .add-card { background:var(--surface); border:1.5px dashed var(--accent2); border-radius:var(--radius); padding:1.25rem; margin-bottom:1.5rem; }
  .add-card-title { font-weight:700; font-size:0.95rem; color:var(--accent); margin-bottom:0.9rem; }
  .form-row { display:flex; gap:0.65rem; flex-wrap:wrap; margin-bottom:0.65rem; }
  .form-group { display:flex; flex-direction:column; gap:0.3rem; flex:1; min-width:140px; }
  .form-group label { font-size:0.78rem; color:var(--muted); font-weight:500; }
  input[type="text"] { background:var(--bg); border:1.5px solid var(--border); border-radius:8px; padding:0.5rem 0.75rem; font-size:0.9rem; font-family:'Noto Sans TC',sans-serif; color:var(--text); outline:none; transition:border-color 0.15s; width:100%; }
  input[type="text"]:focus { border-color:var(--accent); }
  .add-btn { background:var(--accent); color:#FFF; border:none; border-radius:8px; padding:0.55rem 1.25rem; font-size:0.9rem; font-family:'Noto Sans TC',sans-serif; font-weight:700; cursor:pointer; transition:background 0.15s,transform 0.1s; align-self:flex-end; white-space:nowrap; }
  .add-btn:hover { background:#C83A00; }
  .add-btn:active { transform:scale(0.97); }
  .cancel-btn { background:var(--surface2); color:var(--muted); border:1.5px solid var(--border); border-radius:8px; padding:0.55rem 1rem; font-size:0.9rem; font-family:'Noto Sans TC',sans-serif; font-weight:500; cursor:pointer; align-self:flex-end; white-space:nowrap; }
  .cancel-btn:hover { background:var(--border); }

  /* EMOJI PICKER */
  .emoji-field { position:relative; }
  .emoji-trigger { display:flex; gap:0.4rem; align-items:center; background:var(--bg); border:1.5px solid var(--border); border-radius:8px; padding:0.5rem 0.75rem; cursor:pointer; transition:border-color 0.15s; user-select:none; }
  .emoji-trigger:hover { border-color:var(--accent2); }
  .emoji-trigger .selected-emoji { font-size:1.3rem; line-height:1; }
  .emoji-trigger .trigger-hint { font-size:0.78rem; color:var(--muted); }
  .emoji-picker-popup {
    display:none; position:absolute; z-index:300; top:calc(100% + 6px); left:0;
    background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius);
    padding:0.75rem; box-shadow:0 8px 32px rgba(0,0,0,0.15); width:280px; max-height:260px; overflow-y:auto;
  }
  .emoji-picker-popup.open { display:block; }
  .emoji-category-label { font-size:0.7rem; color:var(--muted); font-weight:700; margin:0.5rem 0 0.25rem; letter-spacing:0.05em; }
  .emoji-grid { display:flex; flex-wrap:wrap; gap:2px; margin-bottom:0.25rem; }
  .emoji-opt { font-size:1.3rem; width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:6px; cursor:pointer; transition:background 0.1s; border:none; background:transparent; }
  .emoji-opt:hover { background:var(--surface2); }
  .emoji-opt.selected { background:var(--tag-bg); outline:2px solid var(--accent2); }

  /* IMPORT / EXPORT */
  .io-bar { display:flex; gap:0.65rem; margin-bottom:0.75rem; flex-wrap:wrap; }
  .io-btn { display:flex; align-items:center; gap:0.4rem; background:var(--surface); border:1.5px solid var(--border); border-radius:8px; padding:0.55rem 1rem; font-size:0.88rem; font-family:'Noto Sans TC',sans-serif; font-weight:500; color:var(--text); cursor:pointer; transition:all 0.15s; }
  .io-btn.export { border-color:#A5C898; color:#2E7D32; }
  .io-btn.export:hover { background:#F1F8F1; border-color:#4CAF50; }
  .io-btn.import { border-color:#90B8DC; color:#1565C0; }
  .io-btn.import:hover { background:#EFF5FB; border-color:#1976D2; }
  .io-hint { font-size:0.78rem; color:var(--muted); margin-bottom:1.5rem; line-height:1.7; background:var(--surface2); border-radius:8px; padding:0.65rem 0.9rem; border-left:3px solid var(--accent2); }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:2rem; color:var(--muted); font-size:0.9rem; background:var(--surface); border-radius:var(--radius); border:1.5px dashed var(--border); }
  .empty-state .big-emoji { font-size:3rem; display:block; margin-bottom:0.5rem; }

  /* TOAST */
  #toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(100px); background:var(--text); color:#FFF; padding:0.6rem 1.5rem; border-radius:50px; font-size:0.9rem; font-family:'Noto Sans TC',sans-serif; z-index:999; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); pointer-events:none; white-space:nowrap; }
  #toast.show { transform:translateX(-50%) translateY(0); }

  @media (max-width:480px) {
    header h1 { font-size:1.6rem; }
    .container { padding:1.25rem 0.9rem 3rem; }
    .spin-section { padding:1.25rem 1rem; }
    .form-row { flex-direction:column; }
    .emoji-picker-popup { width:calc(100vw - 2.5rem); }
  }
</style>
</head>
<body>

<header>
  <h1>🍱 午餐抽籤機</h1>
  <p>今天吃什麼，交給命運決定！</p>
</header>

<div class="container">

  <!-- SPIN -->
  <div class="spin-section">
    <div class="result-bowl" id="resultBowl">
      <span class="bowl-icon" id="bowlIcon">🎲</span>
      <span class="bowl-text" id="bowlText">按下抽籤</span>
    </div>
    <button class="spin-btn" id="spinBtn" onclick="spin()">✨ 開始抽籤！</button>
    <p class="empty-hint" id="emptyHint" style="display:none;">請先新增至少一家店家</p>
  </div>

  <!-- FILTER -->
  <div class="filter-bar" id="filterBar">
    <span class="filter-label">篩選：</span>
    <button class="tag-filter-btn active" onclick="filterTag(this,'all')">全部</button>
  </div>

  <!-- ADD FORM -->
  <div class="add-card" id="addCard">
    <div class="add-card-title" id="formTitle">＋ 新增店家</div>
    <input type="hidden" id="editId" value="">
    <div class="form-row">
      <div class="form-group" style="flex:2;">
        <label>店家名稱 *</label>
        <input type="text" id="inputName" placeholder="例：麥當勞、自助餐" maxlength="30">
      </div>
      <div class="form-group" style="flex:1; min-width:120px;">
        <label>圖示</label>
        <div class="emoji-field">
          <div class="emoji-trigger" id="emojiTrigger" onclick="toggleEmojiPicker()">
            <span class="selected-emoji" id="selectedEmoji">🍴</span>
            <span class="trigger-hint">點選更換</span>
          </div>
          <div class="emoji-picker-popup" id="emojiPicker"></div>
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>類型標籤</label>
        <input type="text" id="inputTag" placeholder="例：日式、快餐、素食">
      </div>
      <div class="form-group">
        <label>備註</label>
        <input type="text" id="inputNote" placeholder="例：走路5分鐘" maxlength="30">
      </div>
    </div>
    <div class="form-row" style="justify-content:flex-end; margin-bottom:0;">
      <button class="cancel-btn" id="cancelBtn" onclick="cancelEdit()" style="display:none;">取消</button>
      <button class="add-btn" id="submitBtn" onclick="submitForm()">新增</button>
    </div>
  </div>

  <!-- LIST -->
  <div class="section-title">
    店家清單 <span class="count-badge" id="countBadge">0</span>
  </div>
  <div class="io-bar">
    <button class="io-btn export" onclick="exportExcel()">📥 匯出 Excel</button>
    <button class="io-btn import" onclick="document.getElementById('importFile').click()">📤 匯入 Excel</button>
    <input type="file" id="importFile" accept=".xlsx,.xls" style="display:none" onchange="importExcel(event)">
  </div>
  <div class="io-hint">
    📋 <strong>匯出</strong>：把目前所有店家存成 <code>.xlsx</code> 檔，可用 Excel 編輯後再匯回。<br>
    📂 <strong>匯入</strong>：欄位依序為「名稱、圖示、標籤、備註」，匯入後會<strong>取代</strong>現有清單。
  </div>
  <div class="restaurant-list" id="restaurantList"></div>

</div>

<div id="toast"></div>

<script>
// ── Emoji 分類資料 ──
const EMOJI_CATEGORIES = [
  { label: '米飯麵食', emojis: ['🍱','🍜','🍝','🍛','🍚','🥘','🫕','🍲','🥗','🫔','🌯','🥙'] },
  { label: '肉類燒烤', emojis: ['🍖','🍗','🥩','🥓','🌭','🍔','🍟'] },
  { label: '海鮮日式', emojis: ['🍣','🍱','🦐','🦑','🦞','🦀','🐟','🍤'] },
  { label: '小吃點心', emojis: ['🧆','🥚','🧇','🥞','🧈','🥐','🥖','🫓','🥨','🧀','🥗'] },
  { label: '飲料甜食', emojis: ['🧋','☕','🍵','🥤','🧃','🍰','🎂','🍩','🍪','🍦','🧁'] },
  { label: '蔬食健康', emojis: ['🥗','🥦','🥕','🌽','🍅','🥑','🫑','🧄','🧅'] },
  { label: '店家場所', emojis: ['🏪','🏬','🍽️','🥡','🛵','🏠','🏢'] },
];

const DEFAULT_EMOJI = '🍴';
let selectedEmojiValue = DEFAULT_EMOJI;

function buildEmojiPicker() {
  const picker = document.getElementById('emojiPicker');
  picker.innerHTML = EMOJI_CATEGORIES.map(cat => `
    <div class="emoji-category-label">${cat.label}</div>
    <div class="emoji-grid">
      ${cat.emojis.map(e => `<button class="emoji-opt" onclick="pickEmoji('${e}')">${e}</button>`).join('')}
    </div>
  `).join('');
}

function toggleEmojiPicker() {
  const picker = document.getElementById('emojiPicker');
  picker.classList.toggle('open');
}

function pickEmoji(emoji) {
  selectedEmojiValue = emoji;
  document.getElementById('selectedEmoji').textContent = emoji;
  document.getElementById('emojiPicker').classList.remove('open');
  // highlight selected
  document.querySelectorAll('.emoji-opt').forEach(btn => {
    btn.classList.toggle('selected', btn.textContent === emoji);
  });
}

// close picker when clicking outside
document.addEventListener('click', e => {
  const field = document.getElementById('emojiTrigger');
  const picker = document.getElementById('emojiPicker');
  if (!field.contains(e.target) && !picker.contains(e.target)) {
    picker.classList.remove('open');
  }
});

// ── Data ──
const FOOD_EMOJIS = ['🍜','🍱','🍛','🍝','🥗','🌮','🍔','🍣','🥘','🍲','🥩','🍗','🍖','🫕','🌯','🥙'];
let restaurants = JSON.parse(localStorage.getItem('lunch_restaurants') || '[]');
let activeTag = 'all';
let spinning = false;

if (restaurants.length === 0) {
  restaurants = [
    { id: 1, name: '便利商店', emoji: '🏪', tag: '快餐', note: '最近最方便' },
    { id: 2, name: '自助餐',   emoji: '🍱', tag: '台式', note: 'CP值高' },
    { id: 3, name: '拉麵店',   emoji: '🍜', tag: '日式', note: '走路10分鐘' },
    { id: 4, name: '鹹酥雞',   emoji: '🍗', tag: '台式', note: '下午才開' },
    { id: 5, name: '沙拉輕食', emoji: '🥗', tag: '健康', note: '減肥首選' },
  ];
  save();
}

function save() { localStorage.setItem('lunch_restaurants', JSON.stringify(restaurants)); }
function getFiltered() { return activeTag === 'all' ? restaurants : restaurants.filter(r => r.tag === activeTag); }
function getAllTags() { return [...new Set(restaurants.map(r => r.tag).filter(Boolean))]; }

// ── Render ──
function render() {
  const list = document.getElementById('restaurantList');
  const filtered = getFiltered();
  document.getElementById('countBadge').textContent = filtered.length;

  list.innerHTML = filtered.length === 0
    ? `<div class="empty-state"><span class="big-emoji">🍽️</span>${activeTag === 'all' ? '還沒有店家，快新增一家吧！' : `「${activeTag}」分類下沒有店家`}</div>`
    : filtered.map(r => `
      <div class="restaurant-item" id="item-${r.id}">
        <div class="rest-emoji">${r.emoji || '🍴'}</div>
        <div class="rest-info">
          <div class="rest-name">${escHtml(r.name)}</div>
          <div class="rest-meta">
            ${r.tag  ? `<span class="tag-pill">${escHtml(r.tag)}</span>` : ''}
            ${r.note ? `<span class="rest-note">${escHtml(r.note)}</span>` : ''}
          </div>
        </div>
        <div class="rest-actions">
          <button class="icon-btn" onclick="startEdit(${r.id})" title="編輯">✏️</button>
          <button class="icon-btn delete" onclick="deleteRestaurant(${r.id})" title="刪除">🗑</button>
        </div>
      </div>`).join('');

  renderFilterBar();
  const empty = restaurants.length === 0;
  document.getElementById('spinBtn').disabled = empty;
  document.getElementById('emptyHint').style.display = empty ? 'block' : 'none';
}

function renderFilterBar() {
  const bar = document.getElementById('filterBar');
  const tags = getAllTags();
  bar.innerHTML = `<span class="filter-label">篩選：</span>
    <button class="tag-filter-btn ${activeTag==='all'?'active':''}" onclick="filterTag(this,'all')">全部</button>
    ${tags.map(t=>`<button class="tag-filter-btn ${activeTag===t?'active':''}" onclick="filterTag(this,'${escHtml(t)}')">${escHtml(t)}</button>`).join('')}`;
}

function filterTag(btn, tag) { activeTag = tag; render(); }

// ── Add / Edit ──
function submitForm() {
  const name = document.getElementById('inputName').value.trim();
  if (!name) { showToast('請輸入店家名稱！'); document.getElementById('inputName').focus(); return; }
  const emoji = selectedEmojiValue || DEFAULT_EMOJI;
  const tag   = document.getElementById('inputTag').value.trim();
  const note  = document.getElementById('inputNote').value.trim();
  const editId = document.getElementById('editId').value;

  if (editId) {
    // 編輯模式
    const idx = restaurants.findIndex(r => r.id == editId);
    if (idx !== -1) restaurants[idx] = { id: restaurants[idx].id, name, emoji, tag, note };
    showToast(`✅ 已更新「${name}」！`);
  } else {
    // 新增模式
    restaurants.push({ id: Date.now(), name, emoji, tag, note });
    showToast(`✅ 已新增「${name}」！`);
  }
  save();
  resetForm();
  render();
}

function startEdit(id) {
  const r = restaurants.find(r => r.id === id);
  if (!r) return;
  document.getElementById('editId').value = id;
  document.getElementById('inputName').value = r.name;
  document.getElementById('inputTag').value  = r.tag  || '';
  document.getElementById('inputNote').value = r.note || '';
  pickEmoji(r.emoji || DEFAULT_EMOJI);
  document.getElementById('formTitle').textContent = '✏️ 編輯店家';
  document.getElementById('submitBtn').textContent = '儲存';
  document.getElementById('cancelBtn').style.display = 'block';
  document.getElementById('addCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  document.getElementById('inputName').focus();
}

function cancelEdit() { resetForm(); }

function resetForm() {
  document.getElementById('editId').value = '';
  document.getElementById('inputName').value = '';
  document.getElementById('inputTag').value  = '';
  document.getElementById('inputNote').value = '';
  pickEmoji(DEFAULT_EMOJI);
  document.getElementById('formTitle').textContent = '＋ 新增店家';
  document.getElementById('submitBtn').textContent = '新增';
  document.getElementById('cancelBtn').style.display = 'none';
}

function deleteRestaurant(id) {
  const r = restaurants.find(r => r.id === id);
  restaurants = restaurants.filter(r => r.id !== id);
  if (document.getElementById('editId').value == id) resetForm();
  save(); render();
  if (r) showToast(`已刪除「${r.name}」`);
}

// ── Export / Import ──
function exportExcel() {
  if (restaurants.length === 0) { showToast('目前沒有店家可以匯出！'); return; }
  const data = [
    ['名稱','圖示','標籤','備註'],
    ...restaurants.map(r => [r.name, r.emoji||'', r.tag||'', r.note||''])
  ];
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:20},{wch:6},{wch:12},{wch:20}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '午餐店家');
  XLSX.writeFile(wb, '午餐店家清單.xlsx');
  showToast(`📥 已匯出 ${restaurants.length} 家店家！`);
}

function importExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type:'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header:1 });
      const imported = [];
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const name = (row[0]||'').toString().trim();
        if (!name) continue;
        imported.push({
          id: Date.now() + i,
          name,
          emoji: (row[1]||'').toString().trim() || FOOD_EMOJIS[Math.floor(Math.random()*FOOD_EMOJIS.length)],
          tag:  (row[2]||'').toString().trim(),
          note: (row[3]||'').toString().trim(),
        });
      }
      if (imported.length === 0) { showToast('⚠️ 沒有讀到有效資料！'); return; }
      if (!confirm(`即將匯入 ${imported.length} 家店家，並取代目前清單，確定嗎？`)) return;
      restaurants = imported;
      activeTag = 'all';
      save(); render();
      showToast(`📂 已匯入 ${imported.length} 家店家！`);
    } catch(err) { showToast('⚠️ 讀取失敗，請確認是有效的 Excel 檔！'); }
  };
  reader.readAsBinaryString(file);
  event.target.value = '';
}

// ── Spin ──
function spin() {
  if (spinning) return;
  const pool = getFiltered();
  if (pool.length === 0) { showToast('沒有符合的店家！'); return; }
  spinning = true;
  const bowl = document.getElementById('resultBowl');
  const icon = document.getElementById('bowlIcon');
  const text = document.getElementById('bowlText');
  bowl.className = 'result-bowl spinning';
  document.getElementById('spinBtn').disabled = true;
  const chosen = pool[Math.floor(Math.random() * pool.length)];
  const interval = setInterval(() => {
    const r = pool[Math.floor(Math.random() * pool.length)];
    icon.textContent = r.emoji || '🍴';
    text.textContent = r.name;
    text.style.color = 'var(--muted)';
  }, 90);
  setTimeout(() => {
    clearInterval(interval);
    bowl.className = 'result-bowl result-show';
    bowl.innerHTML = `<div class="bowl-result-name">${chosen.emoji||'🍴'}<br>${escHtml(chosen.name)}</div><div class="bowl-result-tag">${chosen.tag ? escHtml(chosen.tag) : '今日推薦'}</div>`;
    document.querySelectorAll('.restaurant-item').forEach(el => el.classList.remove('highlight'));
    const hl = document.getElementById('item-' + chosen.id);
    if (hl) hl.classList.add('highlight');
    spinning = false;
    document.getElementById('spinBtn').disabled = false;
    showToast(`🎉 今天吃「${chosen.name}」！`);
  }, 3000);
}

// ── Utils ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('inputName').addEventListener('keydown', e => { if (e.key === 'Enter') submitForm(); });

buildEmojiPicker();
render();
</script>
